name: Build and deploy Python app to Azure Web App - ZC-League

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Package backend
        run: |
          mkdir package
          cp -R backend/. package/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: package

  deploy:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: python-app
          path: .

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_239F5EF23FAD47868A1B4226CC5C610F }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_F59B4291D84A41969BF090BD7CC3BAF4 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_F14010A83EE146888EE0793E1F4F662E }}

      - name: Deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: ZC-league
          package: .

      - name: Configure startup
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az webapp config set \
              --name ZC-league \
              --resource-group zc-league-group \
              --startup-file "uvicorn app:app --host 0.0.0.0 --port \$PORT"