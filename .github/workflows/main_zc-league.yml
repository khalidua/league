# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure App Service: https://aka.ms/python-webapps-actions

name: Build and deploy Python app to Azure Web App - ZC-league

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Package backend
        run: |
          mkdir package
          cp -R backend/. package/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: package

  deploy:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: python-app
          path: .

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_5ED776E1CD1C4A47AB965FF957C8D01B }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_F768ABB64ED143CEB2BF49B6283A3C67 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_C68C01C9080B48BEA59B710B159F9FDD }}

      - name: Deploy
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: ZC-league
          package: .

      - name: Configure startup
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az webapp config set \
              --name ZC-league \
              --resource-group zc-league-group \
              --startup-file "uvicorn app:app --host 0.0.0.0 --port \$PORT"