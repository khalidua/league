name: Build and deploy Python app to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: backend

  deploy:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: python-app
          path: .

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_EFF314EF4ED7458FB65CF126A7E339DC }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_B60112BE787040AAB1BEA309490E1AB2 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_C42066FFB3154BC194EBB05D3480A055 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: "ZC-League"
          slot-name: "Production"
          package: .

      - name: Configure startup command
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az webapp config set \
              --name ZC-League \
              --resource-group zc-league-group \
              --startup-file "uvicorn app:app --host 0.0.0.0 --port \$PORT"